<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>doQment — YouTube 노트 정리</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3347;
      --accent: #6c63ff;
      --accent-hover: #574fd6;
      --accent-light: rgba(108,99,255,.12);
      --text: #e8eaf0;
      --text-dim: #7b82a0;
      --success: #34d399;
      --error: #f87171;
      --warning: #fbbf24;
      --radius: 12px;
      --font: 'Pretendard', -apple-system, 'Segoe UI', sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── 헤더 ── */
    header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent); }
    .logo-badge {
      font-size: 11px;
      background: var(--accent-light);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid rgba(108,99,255,.3);
    }

    /* ── 메인 레이아웃 ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 0;
      height: calc(100vh - 65px);
    }

    /* ── 좌측 패널 ── */
    .panel-left {
      border-right: 1px solid var(--border);
      padding: 28px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    /* ── 입력 폼 ── */
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 13px; color: var(--text-dim); }

    input, select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 14px;
      width: 100%;
      outline: none;
      transition: border-color .15s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    input::placeholder { color: var(--text-dim); }
    select option { background: var(--surface2); }

    .url-row {
      display: flex;
      gap: 8px;
    }
    .url-row input { flex: 1; }
    .btn-detect {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      font-size: 12px;
      padding: 0 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
    }
    .btn-detect:hover { color: var(--text); border-color: var(--accent); }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* ── 버튼 ── */
    .btn-primary {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      padding: 13px;
      width: 100%;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-primary:active:not(:disabled) { transform: scale(.98); }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; }

    /* ── 진행 상황 ── */
    .progress-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 10px;
    }
    .progress-panel.visible { display: flex; }

    .step-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-dim);
      transition: color .2s;
    }
    .step-item.active { color: var(--text); }
    .step-item.done { color: var(--success); }
    .step-item.error { color: var(--error); }

    .step-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
      transition: all .2s;
    }
    .step-item.active .step-icon {
      border-color: var(--accent);
      animation: pulse 1.2s infinite;
    }
    .step-item.done .step-icon {
      border-color: var(--success);
      background: var(--success);
      color: #000;
    }
    .step-item.error .step-icon { border-color: var(--error); }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(108,99,255,.4); }
      50% { box-shadow: 0 0 0 6px rgba(108,99,255,0); }
    }

    .step-detail { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

    /* 청크 진행 바 */
    .chunk-progress { display: none; flex-direction: column; gap: 6px; }
    .chunk-progress.visible { display: flex; }
    .chunk-bar-track {
      height: 4px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
    }
    .chunk-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width .3s ease;
      width: 0%;
    }
    .chunk-label { font-size: 11px; color: var(--text-dim); }

    /* 청킹 방식 배지 */
    .chunk-breakdown {
      display: none;
      gap: 5px;
      padding-left: 30px;
      flex-wrap: wrap;
      margin-top: -4px;
    }
    .chunk-breakdown.visible { display: flex; }
    .bd-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      white-space: nowrap;
    }
    .bd-badge.semantic {
      background: rgba(108,99,255,.15);
      color: var(--accent);
      border: 1px solid rgba(108,99,255,.3);
    }
    .bd-badge.forced {
      background: rgba(251,191,36,.1);
      color: var(--warning);
      border: 1px solid rgba(251,191,36,.3);
    }
    .bd-badge.fallback {
      background: rgba(248,113,113,.1);
      color: var(--error);
      border: 1px solid rgba(248,113,113,.3);
    }
    .bd-badge.dim {
      background: var(--surface2);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    /* 청크 처리 중 split_reason 태그 */
    .reason-tag {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 8px;
      font-weight: 600;
    }
    .reason-tag.semantic { background: rgba(108,99,255,.15); color: var(--accent); }
    .reason-tag.forced   { background: rgba(251,191,36,.1);  color: var(--warning); }
    .reason-tag.end      { background: var(--surface2);       color: var(--text-dim); }

    /* ── 통계 배지 ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      display: none;
    }
    .stats-grid.visible { display: grid; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      text-align: center;
    }
    .stat-num { font-size: 22px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

    /* ── 다운로드 버튼 ── */
    .btn-download {
      background: rgba(52,211,153,.1);
      border: 1px solid rgba(52,211,153,.3);
      border-radius: 10px;
      color: var(--success);
      font-size: 14px;
      font-weight: 600;
      padding: 12px;
      width: 100%;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      display: none;
      transition: background .15s;
    }
    .btn-download:hover { background: rgba(52,211,153,.18); }
    .btn-download.visible { display: block; }

    /* ── 우측 패널 (미리보기) ── */
    .panel-right {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preview-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .preview-tabs {
      display: flex;
      gap: 4px;
    }
    .tab {
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-dim);
      border: 1px solid transparent;
      transition: all .15s;
    }
    .tab.active {
      background: var(--accent-light);
      color: var(--accent);
      border-color: rgba(108,99,255,.3);
    }

    .preview-body {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
    }

    /* 마크다운 렌더링 */
    #md-preview {
      max-width: 780px;
      line-height: 1.75;
      font-size: 15px;
    }
    #md-preview h1 { font-size: 26px; margin-bottom: 16px; color: var(--text); }
    #md-preview h2 { font-size: 18px; margin: 28px 0 12px; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    #md-preview h3 { font-size: 15px; margin: 20px 0 8px; color: var(--accent); }
    #md-preview h4 { font-size: 13px; margin: 20px 0 6px; color: var(--text); font-weight: 700; letter-spacing: 0.1px; border-left: 3px solid var(--accent); padding-left: 10px; }
    #md-preview p { margin-bottom: 12px; }
    #md-preview ul { padding-left: 20px; margin-bottom: 12px; }
    #md-preview li { margin-bottom: 5px; }
    #md-preview blockquote {
      border-left: 3px solid var(--accent);
      padding: 8px 16px;
      color: var(--text-dim);
      font-style: italic;
      margin: 12px 0;
      background: var(--accent-light);
      border-radius: 0 6px 6px 0;
    }
    #md-preview code {
      background: var(--surface2);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--warning);
    }
    #md-preview table { border-collapse: collapse; width: 100%; margin: 12px 0; }
    #md-preview th, #md-preview td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      font-size: 13px;
    }
    #md-preview th { background: var(--surface2); }
    #md-preview hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    #md-preview a { color: var(--accent); text-decoration: none; }
    #md-preview a:hover { text-decoration: underline; }
    #md-preview strong { color: var(--text); }

    /* Raw 뷰 */
    #raw-preview {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.7;
      color: var(--text-dim);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* 빈 상태 */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--text-dim);
    }
    .empty-icon { font-size: 48px; opacity: .3; }
    .empty-title { font-size: 16px; font-weight: 600; }
    .empty-desc { font-size: 13px; }

    /* 에러 배너 */
    .error-banner {
      background: rgba(248,113,113,.1);
      border: 1px solid rgba(248,113,113,.3);
      border-radius: 8px;
      color: var(--error);
      font-size: 13px;
      padding: 12px 16px;
      display: none;
    }
    .error-banner.visible { display: block; }

    /* 스크롤바 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* 반응형 */
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: auto; }
      .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
      .panel-right { height: 70vh; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">do<span>Q</span>ment</div>
  <span class="logo-badge">로컬 AI 노트</span>
</header>

<main>
  <!-- 좌측: 설정 패널 -->
  <div class="panel-left">

    <div>
      <div class="section-title">YouTube URL</div>
      <div class="url-row">
        <input id="url-input" type="url" placeholder="https://youtube.com/watch?v=..." />
        <button class="btn-detect" onclick="detectLanguages()">언어 확인</button>
      </div>
    </div>

    <div class="row-2">
      <div class="input-group">
        <label>언어</label>
        <select id="lang-select">
          <option value="en">English (en)</option>
          <option value="ko">한국어 (ko)</option>
          <option value="ja">日本語 (ja)</option>
          <option value="zh">中文 (zh)</option>
          <option value="es">Español (es)</option>
          <option value="fr">Français (fr)</option>
          <option value="de">Deutsch (de)</option>
        </select>
      </div>
      <div class="input-group">
        <label>모델</label>
        <select id="model-select">
          <option value="gemma4:e4b" selected>gemma4:e4b</option>
          <option value="gemma4:4b">gemma4:4b</option>
          <option value="gemma4:12b">gemma4:12b</option>
          <option value="gemma4:27b">gemma4:27b</option>
          <option value="gemma3:4b">gemma3:4b (구버전)</option>
          <option value="gemma3:12b">gemma3:12b (구버전)</option>
        </select>
      </div>
    </div>

    <div class="input-group">
      <label>노트 제목 <span style="color:var(--text-dim)">(선택)</span></label>
      <input id="title-input" type="text" placeholder="비워두면 자동 생성" />
    </div>

    <div class="error-banner" id="error-banner"></div>

    <button class="btn-primary" id="generate-btn" onclick="startGenerate()">
      노트 생성하기
    </button>

    <!-- 진행 상황 -->
    <div class="progress-panel" id="progress-panel">
      <div class="section-title" style="margin-bottom:0">진행 상황</div>

      <div class="step-item" id="step-1">
        <div class="step-icon">1</div>
        <div>
          <div>Transcript 수집</div>
          <div class="step-detail" id="step-1-detail"></div>
        </div>
      </div>
      <div class="step-item" id="step-2">
        <div class="step-icon">2</div>
        <div>
          <div id="step-2-label">청크 분할</div>
          <div class="step-detail" id="step-2-detail"></div>
        </div>
      </div>
      <!-- 청킹 방식 breakdown 배지 -->
      <div class="chunk-breakdown" id="chunk-breakdown">
        <span class="bd-badge semantic" id="bd-semantic" style="display:none"></span>
        <span class="bd-badge forced"   id="bd-forced"   style="display:none"></span>
        <span class="bd-badge fallback" id="bd-fallback" style="display:none"></span>
      </div>
      <div class="step-item" id="step-3">
        <div class="step-icon">3</div>
        <div>
          <div>LLM 노트 추출</div>
          <div class="step-detail" id="step-3-detail"></div>
        </div>
      </div>

      <!-- 청크 진행 바 -->
      <div class="chunk-progress" id="chunk-progress">
        <div class="chunk-bar-track"><div class="chunk-bar-fill" id="chunk-bar"></div></div>
        <div class="chunk-label" id="chunk-label">0 / 0 청크</div>
      </div>

      <div class="step-item" id="step-4">
        <div class="step-icon">4</div>
        <div>노트 병합</div>
      </div>
      <div class="step-item" id="step-5">
        <div class="step-icon">5</div>
        <div>Markdown 저장</div>
      </div>
    </div>

    <!-- 통계 -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="stat-num" id="stat-sections">—</div><div class="stat-label">섹션</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-points">—</div><div class="stat-label">핵심 포인트</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-quotes">—</div><div class="stat-label">인용구</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-defs">—</div><div class="stat-label">용어 정리</div></div>
    </div>

    <!-- 다운로드 -->
    <a class="btn-download" id="download-btn" href="#" download>
      ↓ Markdown 다운로드
    </a>

  </div>

  <!-- 우측: 미리보기 패널 -->
  <div class="panel-right">
    <div class="preview-header">
      <div class="preview-tabs">
        <div class="tab active" onclick="switchTab('preview')" id="tab-preview">미리보기</div>
        <div class="tab" onclick="switchTab('raw')" id="tab-raw">Raw</div>
      </div>
    </div>
    <div class="preview-body">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">📄</div>
        <div class="empty-title">노트가 여기에 표시됩니다</div>
        <div class="empty-desc">URL을 입력하고 노트 생성하기를 눌러주세요</div>
      </div>
      <div id="md-preview"></div>
      <pre id="raw-preview"></pre>
    </div>
  </div>
</main>

<script>
// ── 탭 전환 ──────────────────────────────────────────────
function switchTab(tab) {
  const isPreview = tab === 'preview';
  document.getElementById('tab-preview').classList.toggle('active', isPreview);
  document.getElementById('tab-raw').classList.toggle('active', !isPreview);
  document.getElementById('md-preview').style.display = isPreview ? 'block' : 'none';
  document.getElementById('raw-preview').style.display = isPreview ? 'none' : 'block';
}

// ── 언어 자동 감지 ────────────────────────────────────────
async function detectLanguages() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;
  showError('');
  try {
    const res = await fetch('/api/languages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
    });
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    if (!data.languages.length) { showError('이 영상에는 transcript가 없습니다.'); return; }

    const sel = document.getElementById('lang-select');
    sel.innerHTML = '';
    data.languages.forEach(l => {
      const code = l.match(/\(([^)]+)\)$/)?.[1] || 'en';
      const opt = new Option(l, code);
      sel.appendChild(opt);
    });
    sel.focus();
  } catch(e) {
    showError('언어 감지 실패: ' + e.message);
  }
}

// ── 모델 목록 로드 ────────────────────────────────────────
async function loadModels() {
  try {
    const res = await fetch('/api/models');
    const data = await res.json();
    if (data.models && data.models.length) {
      const sel = document.getElementById('model-select');
      const current = sel.value;
      sel.innerHTML = '';
      data.models.forEach(m => {
        const opt = new Option(m, m);
        sel.appendChild(opt);
      });
      // 기존 선택값 유지
      if (data.models.includes(current)) sel.value = current;
    }
  } catch(e) { /* 무시 */ }
}

// ── 진행 상태 헬퍼 ────────────────────────────────────────
function setStep(n, state, detail) {
  const el = document.getElementById(`step-${n}`);
  if (!el) return;
  el.className = 'step-item ' + (state || '');
  if (detail !== undefined) {
    const detailEl = document.getElementById(`step-${n}-detail`);
    if (detailEl) detailEl.textContent = detail || '';
  }
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.classList.toggle('visible', !!msg);
}

function resetProgress() {
  for (let i = 1; i <= 5; i++) setStep(i, '', '');
  document.getElementById('step-2-label').textContent = '청크 분할';
  document.getElementById('chunk-breakdown').classList.remove('visible');
  ['bd-semantic','bd-forced','bd-fallback'].forEach(id => {
    const el = document.getElementById(id);
    el.style.display = 'none';
    el.textContent = '';
  });
  document.getElementById('chunk-progress').classList.remove('visible');
  document.getElementById('chunk-bar').style.width = '0%';
  document.getElementById('chunk-label').innerHTML = '';
  document.getElementById('stats-grid').classList.remove('visible');
  document.getElementById('download-btn').classList.remove('visible');
  document.getElementById('md-preview').innerHTML = '';
  document.getElementById('raw-preview').textContent = '';
  document.getElementById('empty-state').style.display = 'flex';
}

// ── 마크다운 → HTML (경량 파서) ─────────────────────────
function inlineFormat(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
}

function md2html(md) {
  const lines = md.split('\n');
  let html = '';
  // 현재 열려 있는 ul 깊이 스택
  let listStack = [];

  function closeLists(toDepth) {
    while (listStack.length > toDepth) {
      html += '</ul>';
      listStack.pop();
    }
  }

  let inTable = false;
  let tableRows = [];

  function flushTable() {
    if (!tableRows.length) return;
    html += '<table>' + tableRows.join('') + '</table>';
    tableRows = [];
    inTable = false;
  }

  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i];

    // 표
    if (/^\|/.test(raw)) {
      if (/^[\|\s\-:]+$/.test(raw)) continue; // 구분선 행 스킵
      closeLists(0);
      flushTable();
      const cells = raw.split('|').slice(1, -1).map(c => `<td>${inlineFormat(c.trim())}</td>`).join('');
      tableRows.push(`<tr>${cells}</tr>`);
      inTable = true;
      continue;
    }
    if (inTable) flushTable();

    // 헤더 (#### 먼저 체크해야 ### 에 걸리지 않음)
    const h4 = raw.match(/^#### (.+)/);
    if (h4) { closeLists(0); html += `<h4>${inlineFormat(h4[1])}</h4>`; continue; }
    const h3 = raw.match(/^### (.+)/);
    if (h3) { closeLists(0); html += `<h3>${inlineFormat(h3[1])}</h3>`; continue; }
    const h2 = raw.match(/^## (.+)/);
    if (h2) { closeLists(0); html += `<h2>${inlineFormat(h2[1])}</h2>`; continue; }
    const h1 = raw.match(/^# (.+)/);
    if (h1) { closeLists(0); html += `<h1>${inlineFormat(h1[1])}</h1>`; continue; }

    // 수평선
    if (/^---+$/.test(raw.trim())) { closeLists(0); html += '<hr/>'; continue; }

    // 인용
    const bq = raw.match(/^> (.+)/);
    if (bq) { closeLists(0); html += `<blockquote>${inlineFormat(bq[1])}</blockquote>`; continue; }

    // 다단계 목록: 들여쓰기를 2칸 단위로 depth 계산
    const listMatch = raw.match(/^( *)- (.*)/);
    if (listMatch) {
      const indent = listMatch[1].length;
      const depth = Math.floor(indent / 2) + 1; // 1-based
      const content = inlineFormat(listMatch[2]);

      if (depth > listStack.length) {
        // 더 깊은 레벨 — ul 추가
        while (listStack.length < depth) {
          html += '<ul>';
          listStack.push(depth);
        }
      } else if (depth < listStack.length) {
        // 얕은 레벨로 복귀 — ul 닫기
        closeLists(depth);
      }
      html += `<li>${content}</li>`;
      continue;
    }

    // 목록이 아닌 줄 → 모든 목록 닫기
    closeLists(0);

    // 빈 줄
    if (!raw.trim()) { html += '<br/>'; continue; }

    // HTML 태그로 시작하면 그대로
    if (/^</.test(raw)) { html += raw; continue; }

    // 일반 텍스트 단락
    html += `<p>${inlineFormat(raw)}</p>`;
  }

  closeLists(0);
  if (inTable) flushTable();
  return html;
}

// ── 노트 생성 (SSE) ───────────────────────────────────────
async function startGenerate() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) { showError('URL을 입력해주세요.'); return; }

  showError('');
  resetProgress();

  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  btn.textContent = '생성 중...';
  document.getElementById('progress-panel').classList.add('visible');

  const body = {
    url,
    lang: document.getElementById('lang-select').value,
    title: document.getElementById('title-input').value.trim(),
    model: document.getElementById('model-select').value,
  };

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const messages = buffer.split('\n\n');
      buffer = messages.pop();

      for (const msg of messages) {
        if (!msg.trim()) continue;
        const lines = msg.split('\n');
        let event = 'message', dataStr = '';
        for (const line of lines) {
          if (line.startsWith('event: ')) event = line.slice(7).trim();
          if (line.startsWith('data: ')) dataStr = line.slice(6).trim();
        }
        if (!dataStr) continue;
        const data = JSON.parse(dataStr);
        handleEvent(event, data);
      }
    }
  } catch(e) {
    showError('연결 오류: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '노트 생성하기';
  }
}

function handleEvent(event, data) {
  if (event === 'progress') {
    const n = data.step;
    const state = data.done ? 'done' : 'active';
    setStep(n, state, data.detail || '');

    // step 2 완료: 청킹 방식 배지 표시
    if (n === 2 && data.done && data.chunk_stats) {
      const s = data.chunk_stats;
      const method = data.chunking_method; // "semantic" | "fallback"

      // 레이블 업데이트
      document.getElementById('step-2-label').textContent =
        method === 'semantic' ? '시맨틱 청크 분할' : '청크 분할 (단어 수 폴백)';

      const breakdown = document.getElementById('chunk-breakdown');
      breakdown.classList.add('visible');

      if (method === 'semantic') {
        const bSem = document.getElementById('bd-semantic');
        bSem.textContent = `시맨틱 경계 ${s.semantic}`;
        bSem.style.display = 'inline';

        if (s.max_words > 0) {
          const bForced = document.getElementById('bd-forced');
          bForced.textContent = `단어 수 초과 ${s.max_words}`;
          bForced.style.display = 'inline';
        }
      } else {
        const bFallback = document.getElementById('bd-fallback');
        bFallback.textContent = `단어 수 분할 ${s.total}  (임베딩 모델 없음)`;
        bFallback.style.display = 'inline';
      }
    }

    // 3단계 활성화 시 청크 진행 바 표시
    if (n === 3 && !data.done) {
      document.getElementById('chunk-progress').classList.add('visible');
    }
    if (n === 3 && data.done) {
      document.getElementById('chunk-bar').style.width = '100%';
    }
  }

  if (event === 'chunk') {
    const pct = (data.index / data.total * 100).toFixed(0);
    document.getElementById('chunk-bar').style.width = pct + '%';

    const reasonMap = {
      semantic: ['시맨틱 경계', 'semantic'],
      max_words: ['단어 수 초과', 'forced'],
      end: ['마지막', 'end'],
    };
    const [reasonText, reasonClass] = reasonMap[data.split_reason] || ['', ''];
    const reasonTag = reasonText
      ? `<span class="reason-tag ${reasonClass}">${reasonText}</span>`
      : '';

    document.getElementById('chunk-label').innerHTML =
      `청크 <strong>${data.index}</strong> / ${data.total}` +
      `&nbsp;&nbsp;${data.start_ts} → ${data.end_ts}` +
      (data.word_count ? `&nbsp;·&nbsp;${data.word_count}단어` : '') +
      `&nbsp;&nbsp;${reasonTag}`;

    setStep(3, 'active', `${data.index}/${data.total} 청크 처리 중`);
  }

  if (event === 'done') {
    // 미리보기 업데이트
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('md-preview').innerHTML = md2html(data.markdown);
    document.getElementById('raw-preview').textContent = data.markdown;

    // 통계
    const s = data.stats;
    document.getElementById('stat-sections').textContent = s.sections;
    document.getElementById('stat-points').textContent = s.key_points;
    document.getElementById('stat-quotes').textContent = s.quotes;
    document.getElementById('stat-defs').textContent = s.definitions;
    document.getElementById('stats-grid').classList.add('visible');

    // 다운로드
    const dl = document.getElementById('download-btn');
    dl.href = data.download_url;
    dl.download = data.filename;
    dl.classList.add('visible');

    // 5단계 완료
    setStep(4, 'done', '');
    setStep(5, 'done', '');
  }

  if (event === 'error') {
    showError(data.message);
    // 현재 active 스텝을 error로
    for (let i = 1; i <= 5; i++) {
      if (document.getElementById(`step-${i}`).classList.contains('active')) {
        setStep(i, 'error', '');
      }
    }
  }
}

// ── 초기화 ───────────────────────────────────────────────
window.onload = () => {
  loadModels();
  // URL 파라미터로 자동 채우기
  const params = new URLSearchParams(location.search);
  const u = params.get('url');
  if (u) document.getElementById('url-input').value = u;
};
